task: ko-arc-easy-gen
dataset_path: "Please add the submitted dataset and provide its local path."
dataset_name: easy
output_type: generate_until
test_split: test
doc_to_text: !function preprocess_mmlu_style_gen.doc_to_text
doc_to_target: !function preprocess_mmlu_style_gen.doc_to_target
should_decontaminate: true
doc_to_decontamination_query: "질문: {{question}}\n답변:"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
generation_kwargs:
  until:
    - "\n"
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  temperature: 0.0
  max_gen_toks: 512
repeats: 1
num_fewshot: 5
filter_list:
  - name: label-extract
    filter:
      - function: regex
        regex_pattern: "(?i)(?:정답\\s*[:：]?\\s*)?([A-D])(?:\\s*(?:번|입니다|이에요|가)|[\\.)\\]:：,\\s]|$)"
      - function: take_first
metadata:
  version: 1.0
